<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Syne:wght@700;800&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root{
        --ink:#2B1B3D;
        --ink-soft:#8a7d99;
        --ink-faint:#b4a9c4;
        --cream:#FFFCF6;
        --pink:#FF4FA3;
        --pink-deep:#DE0E68;
        --purple:#9163F7;
        --purple-deep:#6D28D9;
        --amber:#FFA63D;
        --amber-deep:#FF7A1A;
        --lav:#E2D1FF;
        --rose:#FFD3E8;
        --peach:#FFE3BE;
    }

    body {
        width: 800px;
        height: 800px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: transparent;
    }

    #card {
        width: 760px;
        height: 760px;
        border-radius: 36px;
        padding: 60px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        background: var(--cream);
        font-family: 'Plus Jakarta Sans', sans-serif;
        position: relative;
        overflow: hidden;
        box-shadow:
            0 0 0 1px rgba(0,0,0,0.03),
            0 24px 50px -16px rgba(109,40,217,.30),
            0 10px 22px -8px rgba(222,14,104,.14);
    }
    #card-container {
        width: 800px;
        height: 850px;
        border-radius: 36px;
        display: flex;
        justify-content: center;
        align-content: center;
        align-items: center;
        background: #ffffff;
    }

    /* Blobs pastel décoratifs */
    .blob {
        position: absolute;
        border-radius: 50%;
        filter: blur(50px);
        opacity: 0.55;
        z-index: 0;
    }
    .blob-1 {
        width: 280px; height: 280px;
        top: -100px; left: -90px;
        background: var(--lav);
    }
    .blob-2 {
        width: 260px; height: 260px;
        bottom: -110px; right: -80px;
        background: var(--peach);
    }
    .blob-3 {
        width: 200px; height: 200px;
        bottom: 60px; left: -60px;
        background: var(--rose);
        opacity: 0.45;
    }

    /* bulles 3D décoratives, ancrées aux coins, contenues par overflow:hidden */
    .bubble {
        position: absolute;
        z-index: 1;
        width: 76px;
        height: 76px;
        border-radius: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 34px;
        line-height: 1;
    }
    .bubble-purple {
        background: linear-gradient(155deg, var(--purple) 0%, var(--purple-deep) 100%);
        box-shadow:
            0 14px 26px -8px rgba(109,40,217,.5),
            inset 0 -7px 12px rgba(0,0,0,.18),
            inset 0 5px 9px rgba(255,255,255,.35);
    }
    .bubble-pink {
        background: linear-gradient(155deg, var(--pink) 0%, var(--pink-deep) 100%);
        box-shadow:
            0 14px 26px -8px rgba(222,14,104,.5),
            inset 0 -7px 12px rgba(0,0,0,.16),
            inset 0 5px 9px rgba(255,255,255,.4);
    }
    .bubble-amber {
        background: linear-gradient(155deg, var(--amber) 0%, var(--amber-deep) 100%);
        box-shadow:
            0 14px 26px -8px rgba(255,122,26,.45),
            inset 0 -7px 12px rgba(0,0,0,.14),
            inset 0 5px 9px rgba(255,255,255,.4);
    }
    .b-1 { top: -22px; left: -22px; transform: rotate(-10deg); }
    .b-2 { top: -22px; right: -22px; transform: rotate(9deg); }
    .b-3 { bottom: -22px; left: -22px; transform: rotate(-8deg); }
    .b-4 { bottom: -22px; right: -22px; transform: rotate(10deg); }

    .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        z-index: 2;
    }

    .thread-badge {
        font-family: 'Syne', sans-serif;
        font-weight: 800;
        text-transform: uppercase;
        font-size: 21px;
        color: var(--ink);
        letter-spacing: 0.2px;
        background: #ffffff;
        border: 2.5px solid var(--ink);
        padding: 10px 20px;
        border-radius: 100px;
        box-shadow: 3px 3px 0 var(--ink);
    }

    .anon-pill {
        font-size: 14px;
        font-weight: 700;
        color: var(--cream);
        background: var(--ink);
        padding: 10px 18px;
        border-radius: 100px;
        letter-spacing: 1.2px;
        text-transform: uppercase;
    }

    .content {
        flex: 1;
        justify-content: center;
        display: flex;
        align-items: center;
        z-index: 2;
        padding: 30px 0;
    }

    .mention-tag {
        display: inline-block;
        background: linear-gradient(135deg, var(--purple-deep), var(--pink-deep));
        color: var(--cream);
        padding: 9px 20px;
        border-radius: 100px;
        font-size: 18px;
        font-weight: 700;
        margin-bottom: 22px;
    }

    .message-text {
        font-size: {{ font_size | default(38) }}px;
        line-height: 1.4;
        color: var(--cream);
        font-weight: 600;
        word-wrap: break-word;
        letter-spacing: -0.3px;
        border-radius: 12px;
        text-align: center;
        background-color: #2B1B3D;
        padding: 2rem;
    }

    .footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        z-index: 2;
    }
    .footer-label {
        font-size: 14px;
        color: var(--ink-soft);
        font-weight: 600;
    }
    .timestamp {
        font-size: 14px;
        color: var(--ink-faint);
        font-weight: 500;
    }
</style>
</head>
